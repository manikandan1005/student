<div class="card">
    <div class="card-body ">
        <div class="card-header p-3 d-flex"><h1>student List</h1>
            <select class="form-select" aria-label="Default select example" style="width: 18rem;">
            <option (click)="full()" value="full list">full list</option>
            <option (click)="completed()" value="completed">Completed</option>
            <option (click)="notComplet()" value="Not Completed">Not Completed</option>
        </select>
        </div>
        
        <div class="card-body">
            
            <table class="table table-dark table-striped">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Course</th>
                        <th>Status</th>
                    </tr>
                    
                </thead>
                <tbody >
                    <tr *ngFor="let list of studentList">
                        
                    <td>{{list.firstName}}</td>
                    <td>{{list.course}}</td>
                    <td>
                        <span *ngIf="list.status === true; else notComplete">complete</span>
                        <ng-template #notComplete>not complete</ng-template>
                    </td>
                    
                    </tr>
                </tbody>
            </table>
           
        </div>
    </div>
</div>
